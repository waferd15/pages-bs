<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMC Bazaar Tracker</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="wrap">
    <header>
      <div>
        <h1>CMC Bazaar Tracker</h1>
        <div class="subtitle">Compact grouped dashboard</div>
      </div>

      <div class="topbar">
        <input id="search" class="search" placeholder="Search items..." />
        <div class="pill" id="status-pill">Loading...</div>
      </div>
    </header>

    <nav class="tabs" id="category-tabs"></nav>
    <nav class="subtabs" id="subcategory-tabs"></nav>

    <div class="section-title">
      <h2 id="view-title">Loading...</h2>
      <div class="hint">Click a group to expand it</div>
    </div>

    <div class="board" id="board"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
